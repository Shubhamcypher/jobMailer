services:
  postgres:
    image: postgres:17-alpine
    container_name: jobmailer-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ShubhamC/4
      POSTGRES_DB: job_mailer

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_mailer"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - jobmailer-network

  server:
    build:
      context: ./server

    container_name: jobmailer-server

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - ./server/.env

    environment:
      DATABASE_URL: postgresql://postgres:ShubhamC%2F4@postgres:5432/job_mailer?schema=public

    command:
      - sh
      - -c
      - |
        npx prisma migrate deploy
        npm start

    ports:
      - "5000:5000"

    networks:
      - jobmailer-network

  frontend:
    build:
      context: ./frontend

    container_name: jobmailer-frontend

    restart: unless-stopped

    depends_on:
      - server

    ports:
      - "8080:80"

    networks:
      - jobmailer-network

volumes:
  postgres_data:

networks:
  jobmailer-network: